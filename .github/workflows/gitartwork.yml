name: gitartwork from a contribution graph
on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  build:
    name: Make gitartwork SVG
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Generate gitartwork SVG
        id: generate
        uses: jasineri/gitartwork@v1
        with:
          # Use this username's contribution graph
          user_name: dree-max
          # Text on contribution graph
          text: DRIWALE

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected in gitartwork SVG."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected, will push update."
          fi

      - name: Push updated SVG
        if: steps.changes.outputs.has_changes == 'true'
        uses: jasineri/simple-push-action@v1

      - name: Report failure
        if: failure()
        run: |
          echo "::error::Gitartwork workflow failed. Check the logs above for details."
          echo "Failed step: ${{ toJSON(steps) }}"
          exit 1